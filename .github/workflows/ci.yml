name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build angr
        run: nix build .#packages.${{ matrix.system }}.angr -L

      - name: Smoke test
        run: |
          nix run .#packages.${{ matrix.system }}.default -- -c "
          import angr, shutil
          ls = shutil.which('ls')
          p = angr.Project(ls, auto_load_libs=False)
          print('arch:', p.arch)
          print('entry:', hex(p.entry))
          "

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-push@main
        with:
          rolling: true
          visibility: "public"
